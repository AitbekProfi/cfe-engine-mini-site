<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CFE Engine — Full</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="app">
    <!-- START -->
    <section id="screen-start" class="screen is-active">
      <div class="hero">
        <h1>CFE Engine</h1>
        <p class="lead">Профориентационный mini-site: тест → контекст → кейсы → детерминированный результат.</p>
      </div>

      <div class="card">
        <label>Язык</label>
        <div class="row">
          <button id="btn-lang-ru" class="btn btn-primary" type="button">RU</button>
          <button id="btn-lang-kg" class="btn" type="button">KG</button>
        </div>

        <label class="mt">Класс</label>
        <div class="row">
          <button id="btn-grade-9" class="btn" type="button">9 класс</button>
          <button id="btn-grade-11" class="btn btn-primary" type="button">11 класс</button>
        </div>

        <button id="btn-start" class="btn btn-wide btn-primary mt" type="button">Начать тест</button>
      </div>
    </section>

    <!-- TEST -->
    <section id="screen-test" class="screen">
      <div class="card sticky-card">
        <div class="row space-between">
          <div>
            <h2>Тест</h2>
            <div id="test-progress-text" class="muted">Вопрос 1 из 55</div>
          </div>
          <div id="test-answered-badge" class="badge">0 / 55</div>
        </div>

        <div class="progress mt">
          <div id="test-progress-bar" class="progress-fill" style="width:0%"></div>
        </div>
      </div>

      <div id="test-question-card" class="card mt"></div>

      <div class="row space-between mt">
        <button id="btn-test-prev" class="btn" type="button">Назад</button>
        <button id="btn-test-next-question" class="btn btn-primary" type="button">Дальше</button>
      </div>

      <div class="card mt">
        <div class="row space-between">
          <div class="muted">После 55 вопросов перейдёшь к контексту.</div>
          <button id="btn-test-to-cr" class="btn" type="button">Перейти к контексту</button>
        </div>
      </div>
    </section>

    <!-- CR -->
    <section id="screen-cr" class="screen">
      <h2>Контекст</h2>
      <div id="cr-container"></div>
      <div class="row mt space-between">
        <button id="btn-cr-back" class="btn" type="button">Назад</button>
        <button id="btn-cr-next" class="btn btn-primary" type="button">Дальше</button>
      </div>
    </section>

    <!-- CASES -->
    <section id="screen-cases" class="screen">
      <h2>Кейсы</h2>
      <div id="cases-container"></div>
      <div class="row mt space-between">
        <button id="btn-cases-back" class="btn" type="button">Назад</button>
        <button id="btn-cases-finish" class="btn btn-primary" type="button">Получить результат</button>
      </div>
    </section>

    <!-- RESULT -->
    <section id="screen-result" class="screen">
      <h2>Результат</h2>
      <div id="result-container"></div>

      <div class="card mt">
        <h3>Passport</h3>
        <textarea id="passport-text" rows="14" readonly></textarea>
        <div class="row mt">
          <button id="btn-copy-passport" class="btn" type="button">Скопировать passport</button>
          <button id="btn-copy-full" class="btn btn-primary" type="button">Скопировать Full prompt</button>
          <button id="btn-copy-short" class="btn" type="button">Скопировать Short prompt</button>
        </div>
      </div>

      <div class="card mt">
        <button id="btn-submit" class="btn btn-wide btn-primary" type="button">Отправить в систему</button>
        <div id="submit-status" class="muted mt"></div>
      </div>
    </section>
  </main>

  <script src="js/questions.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
